        - /usr/bin/env sh .sqa/script.aquamarine_rustic_panther.sh
        container: qc.acc_sepia_sad_alligator
  QC.Doc:
    repos:
      github.com/ARGOeu/argo-acc-library find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.saffron_observant_ferret.sh
        container: qc.doc_zinnia_foolish_peacock
      github.com/ARGOeu/argo-acc-library git:
        commands:
        - /usr/bin/env sh .sqa/script.maroon_innocent_seahorse.sh
        container: qc.doc_green_enigmatic_condor
      github.com/ARGOeu/argo-acc-library markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.gray_funny_ibis.sh
        container: qc.doc_paprika_content_kangaroo
